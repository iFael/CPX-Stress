name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Audit SSRF
        run: npm run audit:ssrf

      - name: Audit Engine
        run: npm run audit:engine

  convergence-audit:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install k6
        run: choco install k6 --no-progress -y

      - name: Install Locust
        run: python -m pip install --upgrade pip locust

      - name: Install JMeter
        run: choco install jmeter --no-progress -y

      - name: Verify external engines
        run: |
          k6 version
          locust --version
          jmeter -v

      - name: Audit Convergence
        env:
          CPX_CONVERGENCE_STRICT: 'true'
        run: npm run audit:convergence

  extreme-audit:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run extreme audit
        run: npm run audit:extreme
